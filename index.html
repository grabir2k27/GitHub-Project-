<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
 <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen grid items-center mb-8">
    <div class="bg-slate-400 p-8 mx-auto rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="flex flex-col items-center mb-8">
            <img src="/assets/github-logo.png">
            <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-slate-400 mt-1">Sign in to manage your issues</p>
            <div class="space-y-6">
                <div>
                    <lebel class="block text-sm font-bold mb-1">Username</lebel>
                    <input id="username" type="text" value="admin" class="w-full bg-slate-500 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500"/>
                </div>
                <div>
                    <lebel class="block text-sm font-bold mb-1">Password</lebel>
                    <input id="password" type="password" value="admin123" class="w-full bg-slate-500 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500"/>
                </div>

            </div>
        </div>
    </div>
    
</body>
</html>
