<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
 <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="min-h-screen grid items-center mb-8">
    <div class="bg-slate-400 p-8 mx-auto rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="flex flex-col items-center mb-8">
            <img src="/assets/github-logo.png">
            <h1 class="text-3xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-slate-400 mt-1">Sign in to manage your issues</p>
            <div class="space-y-6">
                <div>
                    <lebel class="block text-sm font-bold mb-1">Username</lebel>
                    <input id="username" type="text" value="admin" class="w-full bg-slate-500 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500"/>
                </div>
                <div>
                    <lebel class="block text-sm font-bold mb-1">Password</lebel>
                    <input id="password" type="password" value="admin123" class="w-full bg-slate-500 border border-slate-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500"/>
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:blue-7-- transition py-3 rounded-lg font-semibold flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i>Sign In
                </button>

                <div class="bg-slate-800 border border-slate-700 rounded-lg p-4 text-sm">
                    <p class="font-medium text-emerald-400 mb-2">Demo Credentials</p>
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
        <br>
        <br>


        <!-- <navber> -->


            <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
                <div class="max-w-7xl max-auto px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center">
                            <i class="fa-brands fa-github text-white"></i> 
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold">Phi Lab</h1>
                            <p class="text-xs text-slate-500 -mt-1">Issues Tracker</p>
                        </div>
                    </div>

                    <div class="flex-1 max-w-md max-8">
                        <div class="relative">
                            <input id="searchInput" type="text" placeholder="search issues..." class="w-full bg-slate-800 border border-slate-700 rounded-full pl-10 pr-4 py-2.5 focus:outline-none focus:border-blue-500"/>
                             <i class="fas fa-search absolute left-4 top-3 text-slate-500"></i>
                            <button oneclick="performSearch()" class="absolute right-2 btop-1.5 bg-blue-600 hover:bg-blue-700 px-5 py-1 rounded-full text-sm font-medium">Search</button>
                        </div>
                    </div>

                    <button onclick="logout()" class="flex items-center gap-2 text-slate-400 hover:text-white">
                           <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </nav>


    </div>
    
</body>
</html>
